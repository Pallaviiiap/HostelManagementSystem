version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: hostelops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      # no MYSQL_USER / MYSQL_PASSWORD here – root is configured only via MYSQL_ROOT_PASSWORD
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hostelops-net

  backend:
    build:
      context: ./Backend
    container_name: hostelops-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    networks:
      - hostelops-net

  frontend:
    build:
      context: ./frontend
    container_name: hostelops-frontend
    restart: unless-stopped
    # ports:
    #   - "80:80"
    depends_on:
      - backend
    networks:
      - hostelops-net
  nginx:
    image: nginx:alpine
    container_name: hostelops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - hostelops-net

volumes:
  mysql_data:

networks:
  hostelops-net:
    driver: bridge