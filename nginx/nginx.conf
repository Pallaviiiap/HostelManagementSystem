server {
    listen 80;

    # =========================
    # FRONTEND ROUTING
    # =========================
    location / {
        proxy_pass http://hostelops-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================
    # BACKEND API ROUTING
    # =========================
    location /api/ {
        proxy_pass http://hostelops-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}